<!doctype html>
<html>
	<head>
		<script src="https://cdn.tailwindcss.com"></script>
	</head>

	<body class="bg-slate-900 text-white p-6">
		<div class="flex justify-between">
			<h1 class="text-xl">Mock Test</h1>
			<div id="timer" class="bg-red-600 px-4 py-2 rounded">00:00</div>
		</div>

		<div id="questionBox" class="mt-6 bg-slate-800 p-4 rounded"></div>

		<div id="optionsBox" class="mt-4"></div>

		<div class="flex gap-2 mt-4">
			<button onclick="prevQ()" class="bg-gray-500 px-4 py-2 rounded">
				Prev
			</button>
			<button onclick="nextQ()" class="bg-blue-500 px-4 py-2 rounded">
				Next
			</button>
			<button onclick="markQ()" class="bg-yellow-500 px-4 py-2 rounded">
				Mark
			</button>
		</div>

		<div class="mt-6">
			<h2>Palette</h2>
			<div id="palette" class="flex gap-2 mt-2"></div>
		</div>

		<button onclick="submitTest()" class="mt-6 bg-red-500 px-4 py-2 rounded">
			Submit
		</button>

		<script src="js/test.js"></script>
	</body>
</html>
