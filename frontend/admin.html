<!doctype html>
<html>
	<head>
		<title>Admin Panel</title>
		<script src="https://cdn.tailwindcss.com"></script>
	</head>

	<body class="bg-gray-100 p-6">
		<!-- HEADER -->
		<div class="flex justify-between items-center mb-6">
			<h1 class="text-3xl font-bold">Admin Panel</h1>

			<button
				onclick="goHome()"
				class="bg-gray-500 text-white px-4 py-2 rounded"
			>
				⬅ Home
			</button>
		</div>

		<!-- SETTINGS -->
		<div class="bg-white p-4 rounded shadow mb-6">
			<h2 class="text-xl font-bold mb-3">Test Settings</h2>

			<input id="total" placeholder="Total Questions"
				class="border p-2 w-full mb-2 rounded"/>

			<input id="timer" placeholder="Timer (minutes)"
				class="border p-2 w-full mb-2 rounded"/>

			<button onclick="saveSettings()"
				class="bg-blue-500 text-white px-4 py-2 rounded w-full">
				Save Settings
			</button>
		</div>

		<!-- ADD QUESTION -->
		<div class="bg-white p-4 rounded shadow">
			<h2 class="text-xl font-bold mb-3">Add Question</h2>

			<textarea id="q" placeholder="Question"
				class="border p-2 w-full mb-2 rounded"></textarea>

			<textarea id="code" placeholder="Code (optional)"
				class="border p-2 w-full mb-2 rounded font-mono"></textarea>

			<input id="a" placeholder="Option A"
				class="border p-2 w-full mb-2 rounded"/>

			<input id="b" placeholder="Option B"
				class="border p-2 w-full mb-2 rounded"/>

			<input id="c" placeholder="Option C"
				class="border p-2 w-full mb-2 rounded"/>

			<input id="d" placeholder="Option D"
				class="border p-2 w-full mb-2 rounded"/>

			
			<input id="correct" placeholder="Correct (1-4)"
				class="border p-2 w-full mb-2 rounded"/>

			<input id="subject" placeholder="Subject"
				class="border p-2 w-full mb-2 rounded"/>

			<button onclick="addQuestion()"
				class="bg-green-500 text-white px-4 py-2 rounded w-full">
				Add Question
			</button>
		</div>

		<!--  ALL QUESTIONS LIST -->
		<div class="mt-6">
			<h2 class="text-xl font-bold mb-3">All Questions</h2>

			<!-- Yaha dynamically questions render honge -->
			<div id="questionsList"></div>
		</div>

		<script>
			// 🔙 HOME
			function goHome() {
				window.location.href = '/';
			}

			//  ADD QUESTION
			async function addQuestion() {
				const data = {
					question: document.getElementById('q').value,
					code: document.getElementById('code').value,
					optionA: document.getElementById('a').value,
					optionB: document.getElementById('b').value,
					optionC: document.getElementById('c').value,
					optionD: document.getElementById('d').value,
					correct: Number(document.getElementById('correct').value),
					subject: document.getElementById('subject').value,
				};

				try {
					const res = await fetch('http://localhost:3000/questions', {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify(data),
					});

					const result = await res.json();

					alert(result.msg || 'Question Added');

					// reset form
					document.getElementById('q').value = '';
					document.getElementById('code').value = '';
					document.getElementById('a').value = '';
					document.getElementById('b').value = '';
					document.getElementById('c').value = '';
					document.getElementById('d').value = '';
					document.getElementById('correct').value = '';
					document.getElementById('subject').value = '';

					//  refresh list after adding
					loadQuestions();

				} catch (err) {
					alert('Error adding question');
					console.error(err);
				}
			}

			//  SETTINGS
			async function saveSettings() {
				const data = {
					totalQuestions: Number(document.getElementById('total').value),
					timer: Number(document.getElementById('timer').value),
				};

				try {
					const res = await fetch('http://localhost:3000/settings', {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify(data),
					});

					const result = await res.json();

					alert(result.msg || 'Settings Updated');
				} catch (err) {
					alert('Error updating settings');
					console.error(err);
				}
			}

			//  LOAD ALL QUESTIONS
			async function loadQuestions() {
				try {
					const res = await fetch('http://localhost:3000/questions');
					const data = await res.json();

					let html = '';

					data.forEach((q) => {
						html += `
							<div class="bg-white p-4 rounded shadow mb-4">
								<p class="font-semibold">${q.question}</p>

								${q.code ? `<pre class="bg-gray-100 p-2 mt-2 text-sm">${q.code}</pre>` : ''}

								<div class="mt-2 text-sm">
									<p>A. ${q.opt1}</p>
									<p>B. ${q.opt2}</p>
									<p>C. ${q.opt3}</p>
									<p>D. ${q.opt4}</p>
								</div>

								<p class="text-green-600 mt-2">
									Correct: Option ${q.correct}
								</p>

								<p class="text-gray-500 text-sm">
									Subject: ${q.subject}
								</p>

								<!--  DELETE BUTTON -->
								<button onclick="deleteQ(${q.id})"
									class="bg-red-500 text-white px-3 py-1 mt-2 rounded">
									Delete
								</button>
							</div>
						`;
					});

					document.getElementById('questionsList').innerHTML = html;

				} catch (err) {
					console.error(err);
				}
			}

			//  DELETE QUESTION
			async function deleteQ(id) {
				try {
					await fetch(`http://localhost:3000/questions/${id}`, {
						method: 'DELETE',
					});

					alert('Deleted');
					loadQuestions();

				} catch (err) {
					console.error(err);
				}
			}

			//  AUTO LOAD ON PAGE OPEN
			loadQuestions();
		</script>
	</body>
</html>
